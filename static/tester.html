<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HermesTranslate — Translation Tester</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; color: #333; padding: 24px;
  }
  .card {
    background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 32px; width: 100%; max-width: 640px;
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; color: #1a73e8; }
  .sub { font-size: 0.85rem; color: #666; margin-bottom: 20px; }
  textarea {
    width: 100%; height: 120px; padding: 12px; border: 1px solid #d0d5dd;
    border-radius: 8px; font-size: 1rem; resize: vertical; font-family: inherit;
    transition: border-color 0.2s;
  }
  textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.15); }
  .btn-row {
    display: flex; gap: 10px; margin-top: 12px;
  }
  .btn-row button { flex: 1; }
  button {
    padding: 12px; border: none;
    border-radius: 8px; background: #1a73e8; color: #fff;
    font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #1557b0; }
  button:disabled { background: #a0c4f1; cursor: not-allowed; }
  button.cancel-btn { background: #d93025; display: none; }
  button.cancel-btn:hover { background: #b3261e; }
  button.cancel-btn.show { display: block; }

  /* Progress bar */
  .progress-wrap { margin-top: 16px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-bar {
    height: 6px; border-radius: 3px; background: #e1e4e8; overflow: hidden;
  }
  .progress-fill {
    height: 100%; width: 0%; border-radius: 3px;
    background: linear-gradient(90deg, #1a73e8, #4285f4);
    transition: width 0.4s ease;
  }
  .progress-fill.pending { width: 10%; }
  .progress-fill.translating { width: 60%; animation: pulse 1.2s infinite; }
  .progress-fill.completed { width: 100%; background: #34a853; }
  .progress-fill.failed { width: 100%; background: #d93025; }
  .progress-fill.cancelled { width: 100%; background: #f9ab00; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .progress-status {
    font-size: 0.8rem; color: #666; margin-top: 6px; text-transform: capitalize;
  }

  /* Result */
  .result {
    margin-top: 20px; display: none;
  }
  .result.show { display: block; }
  .result-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  @media (max-width: 500px) {
    .result-row { grid-template-columns: 1fr; }
  }
  .result-box {
    padding: 14px; border-radius: 8px; border: 1px solid #e1e4e8;
    background: #f6f8fa;
  }
  .result-box .label {
    font-size: 0.75rem; color: #666; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .result-box .value {
    font-size: 1rem; word-break: break-word; white-space: pre-wrap;
  }
  .result-box.source { border-left: 3px solid #1a73e8; }
  .result-box.translated { border-left: 3px solid #34a853; }
  .error-msg {
    margin-top: 16px; padding: 14px; border-radius: 8px;
    color: #d93025; background: #fce8e6; border: 1px solid #f5c6cb;
    display: none;
  }
  .error-msg.show { display: block; }

  /* History */
  .history-section { margin-top: 28px; }
  .history-title {
    font-size: 0.9rem; font-weight: 600; color: #666;
    margin-bottom: 10px;
  }
  .history-list { list-style: none; }
  .history-item {
    padding: 10px 12px; border-radius: 6px; border: 1px solid #e1e4e8;
    margin-bottom: 8px; cursor: pointer; transition: background 0.15s;
    font-size: 0.85rem;
  }
  .history-item:hover { background: #f0f4ff; }
  .history-item .h-orig { color: #666; margin-bottom: 2px; }
  .history-item .h-trans { color: #1a73e8; font-weight: 500; }
  .history-item .h-meta {
    font-size: 0.7rem; color: #999; margin-top: 4px;
  }
  .history-item .h-status {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    font-size: 0.7rem; font-weight: 600;
  }
  .h-status.completed { background: #e6f4ea; color: #137333; }
  .h-status.failed { background: #fce8e6; color: #c5221f; }
  .h-status.cancelled { background: #fef7e0; color: #b06000; }
  .no-history {
    font-size: 0.8rem; color: #999; text-align: center;
    padding: 16px;
  }
</style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="card">
  <h1>HermesTranslate</h1>
  <p class="sub">Translation Tester — ทดสอบแปลภาษาไทยเป็นอังกฤษ (AI + WebSocket)</p>

  <textarea id="textInput" placeholder="ใส่ข้อความภาษาไทยที่ต้องการแปล..."></textarea>

  <div class="btn-row">
    <button id="submitBtn" onclick="submitTranslation()">แปลภาษา</button>
    <button id="cancelBtn" class="cancel-btn" onclick="cancelTranslation()">ยกเลิก</button>
  </div>

  <!-- Progress bar -->
  <div id="progressWrap" class="progress-wrap">
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div class="progress-status" id="progressStatus"></div>
  </div>

  <!-- Result -->
  <div id="result" class="result">
    <div class="result-row">
      <div class="result-box source">
        <div class="label">Original (ไทย)</div>
        <div class="value" id="origText">—</div>
      </div>
      <div class="result-box translated">
        <div class="label">Translated (English)</div>
        <div class="value" id="transText">—</div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div id="errorMsg" class="error-msg"></div>

  <!-- History -->
  <div class="history-section">
    <div class="history-title">Recent Translations</div>
    <ul id="historyList" class="history-list">
      <li class="no-history">No translations yet</li>
    </ul>
  </div>
</div>

<script>
const API_BASE = (window.location.protocol === 'file:' || window.location.origin === 'null')
  ? 'http://localhost:8000'
  : window.location.origin;

const WS_BASE = API_BASE.replace(/^http/, 'ws');

const HISTORY_KEY = 'hermes_translate_history';
const MAX_HISTORY = 20;

let currentTaskId = null;
let ws = null;
let pollTimer = null;
let wsReconnectAttempt = 0;
let usePollingFallback = false;

// ── History helpers ─────────────────────────────────────────────

function loadHistory() {
  try {
    return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
  } catch { return []; }
}

function saveHistory(items) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, MAX_HISTORY)));
  } catch { /* quota exceeded — silently drop */ }
}

function addToHistory(entry) {
  const history = loadHistory();
  const idx = history.findIndex(h => h.task_id === entry.task_id);
  if (idx >= 0) history[idx] = entry;
  else history.unshift(entry);
  saveHistory(history);
  renderHistory();
}

function renderHistory() {
  const history = loadHistory();
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<li class="no-history">No translations yet</li>';
    return;
  }
  list.innerHTML = history.map(h => {
    const orig = (h.original_text || '').substring(0, 60);
    const trans = (h.result_text || '—').substring(0, 80);
    const time = h.created_at ? new Date(h.created_at).toLocaleString('th-TH') : '';
    return `<li class="history-item" onclick="restoreHistoryItem('${h.task_id}')">
      <div class="h-orig">${escHtml(orig)}</div>
      <div class="h-trans">${escHtml(trans)}</div>
      <div class="h-meta">
        <span class="h-status ${h.status}">${h.status}</span>
        ${time ? ' &middot; ' + time : ''}
      </div>
    </li>`;
  }).join('');
}

function restoreHistoryItem(taskId) {
  const history = loadHistory();
  const entry = history.find(h => h.task_id === taskId);
  if (!entry) return;
  document.getElementById('textInput').value = entry.original_text || '';
  showResult(entry.original_text, entry.result_text, entry.status);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── UI helpers ──────────────────────────────────────────────────

function setProgress(status) {
  const wrap = document.getElementById('progressWrap');
  const fill = document.getElementById('progressFill');
  const statusEl = document.getElementById('progressStatus');

  wrap.classList.add('show');
  fill.className = 'progress-fill ' + status;
  statusEl.textContent = status;

  // Hide progress on terminal states after a short delay
  if (['completed', 'failed', 'cancelled'].includes(status)) {
    setTimeout(() => { wrap.classList.remove('show'); }, 1500);
  }
}

function showResult(original, translated, status) {
  const resultDiv = document.getElementById('result');
  document.getElementById('origText').textContent = original || '—';
  document.getElementById('transText').textContent = translated || '—';
  resultDiv.classList.add('show');
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

function showCancel(show) {
  const btn = document.getElementById('cancelBtn');
  btn.classList.toggle('show', show);
}

function setSubmitting(active) {
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = active;
  submitBtn.textContent = active ? 'กำลังส่ง...' : 'แปลภาษา';
}

// ── WebSocket ───────────────────────────────────────────────────

function connectWebSocket(taskId) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.close();
  }

  const url = WS_BASE + '/ws/task/' + taskId;
  ws = new WebSocket(url);

  ws.onopen = () => {
    wsReconnectAttempt = 0;
    usePollingFallback = false;
    console.log('WebSocket connected for', taskId);
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleStatusUpdate(data);
    } catch (e) {
      console.error('WebSocket parse error:', e);
    }
  };

  ws.onclose = (event) => {
    console.log('WebSocket closed:', event.code, event.reason);
    // If not a clean close and not terminal yet, retry with backoff
    if (!usePollingFallback && currentTaskId === taskId) {
      wsReconnectAttempt++;
      const delay = Math.min(1000 * Math.pow(2, wsReconnectAttempt - 1), 10000);
      console.log('WebSocket reconnect attempt', wsReconnectAttempt, 'in', delay, 'ms');
      setTimeout(() => {
        if (currentTaskId === taskId) connectWebSocket(taskId);
      }, delay);
    }
  };

  ws.onerror = (err) => {
    console.error('WebSocket error — falling back to polling');
    usePollingFallback = true;
    startPolling(taskId);
  };
}

// ── HTTP Polling (fallback) ─────────────────────────────────────

function startPolling(taskId) {
  stopPolling();
  pollTimer = setInterval(async () => {
    try {
      const resp = await fetch(API_BASE + '/status/' + taskId);
      if (!resp.ok) return;
      const data = await resp.json();
      handleStatusUpdate(data);
    } catch (e) {
      console.error('Polling error:', e);
    }
  }, 1500);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ── Status handler ──────────────────────────────────────────────

function handleStatusUpdate(data) {
  if (data.task_id !== currentTaskId) return;

  setProgress(data.status);

  if (data.status === 'completed') {
    showResult(data.original_text, data.result, 'completed');
    addToHistory({
      task_id: data.task_id,
      status: 'completed',
      original_text: data.original_text,
      result_text: data.result,
      created_at: new Date().toISOString(),
    });
    cleanup();
  } else if (data.status === 'failed') {
    showError('Translation failed after retries. Last output shown below.');
    showResult(data.original_text, data.result, 'failed');
    addToHistory({
      task_id: data.task_id,
      status: 'failed',
      original_text: data.original_text,
      result_text: data.result,
      created_at: new Date().toISOString(),
    });
    cleanup();
  } else if (data.status === 'cancelled') {
    showError('Translation cancelled.');
    cleanup();
  }
}

function cleanup() {
  stopPolling();
  if (ws) { ws.close(); ws = null; }
  currentTaskId = null;
  showCancel(false);
  setSubmitting(false);
}

// ── Submit ──────────────────────────────────────────────────────

async function submitTranslation() {
  const textInput = document.getElementById('textInput');
  const text = textInput.value.trim();

  if (!text) {
    showError('กรุณากรอกข้อความก่อนกดแปล');
    return;
  }

  hideError();
  document.getElementById('result').classList.remove('show');
  cleanup();
  setSubmitting(true);

  try {
    const resp = await fetch(API_BASE + '/translate/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.detail || 'Request failed (HTTP ' + resp.status + ')');
    }

    const data = await resp.json();
    currentTaskId = data.task_id;
    showCancel(true);
    setProgress('pending');

    // Try WebSocket first; fallback to polling on error
    usePollingFallback = false;
    wsReconnectAttempt = 0;
    connectWebSocket(data.task_id);
  } catch (err) {
    showError('เกิดข้อผิดพลาด: ' + err.message);
    setSubmitting(false);
  }
}

// ── Cancel ──────────────────────────────────────────────────────

async function cancelTranslation() {
  if (!currentTaskId) return;

  try {
    const resp = await fetch(API_BASE + '/cancel/' + currentTaskId, {
      method: 'POST',
    });
    if (resp.ok) {
      setProgress('cancelled');
      showError('Translation cancelled.');
      cleanup();
    } else {
      const errData = await resp.json().catch(() => ({}));
      showError('Cancel failed: ' + (errData.detail || 'Unknown error'));
    }
  } catch (err) {
    showError('Cancel error: ' + err.message);
  }
}

// ── Init ────────────────────────────────────────────────────────

// Submit on Ctrl+Enter
document.getElementById('textInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    submitTranslation();
  }
});

// Load history on startup
renderHistory();
</script>

<script>
fetch('nav.html').then(function(r){return r.text()}).then(function(h){
  document.getElementById('nav-placeholder').innerHTML = h;
});
</script>

</body>
</html>
