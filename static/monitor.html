<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HermesTranslate — Queue Monitor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f2f5; color: #333; padding: 24px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 900px; margin: 0 auto 24px;
  }
  h1 { font-size: 1.4rem; color: #1a73e8; }
  .status-dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 50%;
    margin-right: 6px;
  }
  .status-dot.online { background: #34a853; box-shadow: 0 0 6px rgba(52,168,83,0.5); }
  .status-dot.offline { background: #d93025; }
  .dashboard {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px; max-width: 900px; margin: 0 auto;
  }
  .card {
    background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    padding: 24px;
  }
  .card h3 {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;
    color: #888; margin-bottom: 8px;
  }
  .card .big {
    font-size: 2.4rem; font-weight: 700; line-height: 1.2;
  }
  .card .sub-info { font-size: 0.85rem; color: #888; margin-top: 6px; }
  .card .rate { font-size: 0.85rem; color: #555; margin-top: 10px; }
  .card .rate span { font-weight: 600; }
  .card.consumer .big { color: #34a853; }
  .card.consumer.no-worker .big { color: #d93025; }
  .card.ready .big { color: #f9ab00; }
  .card.total .big { color: #1a73e8; }
  .card.unacked .big { color: #9334e6; }
  .footer {
    max-width: 900px; margin: 16px auto 0; font-size: 0.75rem; color: #aaa; text-align: right;
  }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 0.75rem; font-weight: 600;
  }
  .badge.ok { background: #e6f4ea; color: #137333; }
  .badge.warn { background: #fef7e0; color: #b06000; }
  .badge.err { background: #fce8e6; color: #c5221f; }
</style>
</head>
<body>

<div class="header">
  <h1>HermesTranslate Queue Monitor</h1>
  <div>
    <span class="status-dot online" id="connDot"></span>
    <span id="connLabel" style="font-size:0.85rem;color:#666;">เชื่อมต่ออยู่</span>
  </div>
</div>

<div class="dashboard">
  <div class="card total">
    <h3>Total Messages</h3>
    <div class="big" id="total">—</div>
    <div class="sub-info" id="queueName">Queue: —</div>
  </div>

  <div class="card ready">
    <h3>Ready (Pending)</h3>
    <div class="big" id="ready">—</div>
    <div class="sub-info">รอ Worker ดึงไปทำงาน</div>
  </div>

  <div class="card unacked">
    <h3>Unacked (Processing)</h3>
    <div class="big" id="unacked">—</div>
    <div class="sub-info">กำลังประมวลผลโดย Worker</div>
  </div>

  <div class="card consumer" id="consumerCard">
    <h3>Consumer (Worker)</h3>
    <div class="big" id="consumers">—</div>
    <div class="sub-info" id="consumerStatus"></div>
  </div>

  <div class="card">
    <h3>Publish Rate</h3>
    <div class="big" id="pubRate">—</div>
    <div class="sub-info">msg/s</div>
  </div>

  <div class="card">
    <h3>Deliver Rate</h3>
    <div class="big" id="delRate">—</div>
    <div class="sub-info">msg/s</div>
  </div>
</div>

<div class="footer" id="footer">กำลังดึงข้อมูล...</div>

<script>
const API_BASE = (window.location.protocol === 'file:' || window.location.origin === 'null')
  ? 'http://localhost:8000'
  : window.location.origin;
const POLL_INTERVAL = 2000; // 2 seconds
let errorCount = 0;

async function fetchStats() {
  try {
    const resp = await fetch(API_BASE + '/queue/stats');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    updateUI(data);
    setConnectionStatus(true);
    errorCount = 0;
  } catch (err) {
    errorCount++;
    if (errorCount > 3) setConnectionStatus(false);
    document.getElementById('footer').textContent =
      'Error: ' + err.message + ' (retry #' + errorCount + ')';
  }
}

function updateUI(data) {
  document.getElementById('total').textContent = data.messages_total ?? '—';
  document.getElementById('ready').textContent = data.messages_ready ?? '—';
  document.getElementById('unacked').textContent = data.messages_unacked ?? '—';
  document.getElementById('consumers').textContent = data.consumers ?? '—';
  document.getElementById('queueName').textContent = 'Queue: ' + (data.queue_name || '—');
  document.getElementById('pubRate').textContent = (data.publish_rate ?? 0).toFixed(1);
  document.getElementById('delRate').textContent = (data.deliver_rate ?? 0).toFixed(1);

  const consumerCard = document.getElementById('consumerCard');
  const consumerStatus = document.getElementById('consumerStatus');
  if (data.consumers > 0) {
    consumerCard.classList.remove('no-worker');
    consumerStatus.textContent = 'Worker ทำงานปกติ (active)';
  } else {
    consumerCard.classList.add('no-worker');
    consumerStatus.textContent = 'ไม่มี Worker — ตรวจสอบ docker-compose';
  }

  document.getElementById('footer').textContent =
    'Last update: ' + new Date().toLocaleTimeString('th-TH');
}

function setConnectionStatus(online) {
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  if (online) {
    dot.className = 'status-dot online';
    label.textContent = 'เชื่อมต่ออยู่';
  } else {
    dot.className = 'status-dot offline';
    label.textContent = 'เชื่อมต่อไม่ได้';
  }
}

fetchStats();
setInterval(fetchStats, POLL_INTERVAL);
</script>

</body>
</html>
